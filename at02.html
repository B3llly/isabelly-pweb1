<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWEB1 — Cap. 05 — AT02 — Cadastro de Usuário</title>
</head>

<body>

  <header>
    <h1>Cadastro de Usuário</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>

  <main>

    <form action="https://httpbin.org/post" method="post">

      <p>
        <label for="nome">Nome completo:</label><br>
        <input type="text" id="nome" name="nome" minlength="3" required>
      </p>

      <p>
        <label for="email">E-mail:</label><br>
        <input type="email" id="email" name="email" required>
      </p>

      <p>
        <label for="senha">Senha:</label><br>
        <input type="password" id="senha" name="senha" minlength="8" required>
      </p>

      <p>
        <label for="nascimento">Data de nascimento:</label><br>
        <input type="date" id="nascimento" name="nascimento" required>
      </p>

      <fieldset>
        <legend>Gênero</legend>

        <label>
          <input type="radio" name="genero" value="masculino">
          Masculino
        </label><br>

        <label>
          <input type="radio" name="genero" value="feminino">
          Feminino
        </label><br>

        <label>
          <input type="radio" name="genero" value="outro">
          Outro
        </label><br>

        <label>
          <input type="radio" name="genero" value="prefiro_nao_informar">
          Prefiro não informar
        </label>

      </fieldset>

      <p>
        <label>
          <input type="checkbox" name="aceite" value="sim" required>
          Aceito os termos de uso
        </label>
      </p>

      <button type="submit">Criar conta</button>
      <button type="reset">Limpar campos</button>

    </form>

  </main>

</body>
</html>

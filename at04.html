<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWEB1 — Cap. 05 — AT04 — Inscrição em Evento</title>
</head>

<body>

<header>
  <h1>Inscrição — Semana de Tecnologia IFAL</h1>
  <p><a href="../index.html">← Voltar para a página principal</a></p>
</header>

<main>

<p>* Campos obrigatórios</p>

<form action="https://httpbin.org/post" method="post" enctype="multipart/form-data">

  <input type="hidden" name="edicao" value="2026">

  <fieldset>
    <legend>Identificação</legend>

    <p>
      <label for="nome">Nome completo*:</label><br>
      <input type="text" id="nome" name="nome" required>
    </p>

    <p>
      <label for="email">E-mail institucional*:</label><br>
      <input type="email" id="email" name="email" required>
    </p>

    <p>
      <label for="cidade">Cidade:</label><br>
      <input list="cidades" id="cidade" name="cidade">

      <datalist id="cidades">
        <option value="Maceió">
        <option value="Arapiraca">
        <option value="Palmeira dos Índios">
        <option value="Rio Largo">
        <option value="São Miguel dos Campos">
        <option value="Penedo">
        <option value="União dos Palmares">
        <option value="Delmiro Gouveia">
      </datalist>
    </p>

    <p>
      <label for="foto">Foto para crachá:</label><br>
      <input type="file" id="foto" name="foto" accept="image/jpeg,image/png"
      aria-describedby="info-foto">

      <small id="info-foto">
        Formatos aceitos: JPG e PNG. Tamanho máximo: 2 MB.
      </small>
    </p>

  </fieldset>


  <fieldset>
    <legend>Preferências</legend>

    <p>
      <label for="chegada">Data e hora de chegada:</label><br>
      <input type="datetime-local" id="chegada" name="chegada">
    </p>

    <p>
      <label for="experiencia">
        Nível de experiência: <span id="valor-experiencia">5</span>/10
      </label><br>

      <input type="range" id="experiencia" name="experiencia"
      min="0" max="10" value="5"
      oninput="document.getElementById('valor-experiencia').textContent = this.value">
    </p>

    <p>
      <label for="cor">Cor da camiseta:</label><br>
      <input type="color" id="cor" name="cor_camiseta" value="#1a73e8">
    </p>

    <p>
      <label for="oficinas">Oficinas de interesse:</label><br>
      <select id="oficinas" name="oficinas[]" multiple size="4"
      aria-describedby="info-oficinas">

        <option>HTML e CSS</option>
        <option>JavaScript</option>
        <option>Banco de Dados</option>
        <option>Python</option>
        <option>Git e GitHub</option>

      </select>

      <small id="info-oficinas">
        Use Ctrl (ou Cmd no Mac) para selecionar mais de uma oficina.
      </small>
    </p>

  </fieldset>

  <br>

  <button type="submit">Confirmar inscrição</button>

</form>

</main>

</body>
</html>

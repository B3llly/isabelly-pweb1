<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PWEB1 — Cap. 05 — AT03 — Matrícula Acadêmica</title>
</head>

<body>

  <header>
    <h1>Formulário de Matrícula Acadêmica</h1>
    <p><a href="../index.html">← Voltar para a página principal</a></p>
  </header>

  <main>

    <p>* Campos obrigatórios</p>

    <form action="https://httpbin.org/post" method="post">

      <fieldset>
        <legend>Dados Pessoais</legend>

        <p>
          <label for="nome">Nome completo*:</label><br>
          <input type="text" id="nome" name="nome" required minlength="5" maxlength="100">
        </p>

        <p>
          <label for="cpf">CPF*:</label><br>
          <input type="text" id="cpf" name="cpf" required placeholder="000.000.000-00"
          pattern="\d{3}\.\d{3}\.\d{3}-\d{2}" title="CPF no formato 000.000.000-00">
        </p>

        <p>
          <label for="telefone">Telefone:</label><br>
          <input type="tel" id="telefone" name="telefone"
          placeholder="(82) 99999-9999"
          pattern="\(\d{2}\)\s\d{4,5}-\d{4}">
        </p>

        <p>
          <label for="email">E-mail*:</label><br>
          <input type="email" id="email" name="email" required>
        </p>

      </fieldset>


      <fieldset>
        <legend>Dados Acadêmicos</legend>

        <p>
          <label for="curso">Curso*:</label><br>
          <select id="curso" name="curso" required>
            <option value="">Selecione um curso</option>

            <optgroup label="Computação">
              <option value="si">Sistemas de Informação</option>
              <option value="cc">Ciência da Computação</option>
              <option value="ec">Engenharia da Computação</option>
            </optgroup>

            <optgroup label="Gestão">
              <option value="adm">Administração</option>
              <option value="cont">Ciências Contábeis</option>
            </optgroup>
          </select>
        </p>

        <fieldset>
          <legend>Período</legend>

          <label><input type="radio" name="periodo" value="manha"> Manhã</label><br>
          <label><input type="radio" name="periodo" value="tarde"> Tarde</label><br>
          <label><input type="radio" name="periodo" value="noite"> Noite</label>

        </fieldset>

        <p>
          <label for="ano">Ano de ingresso*:</label><br>
          <input type="number" id="ano" name="ano_ingresso"
          min="2025" max="2030" required>
        </p>

      </fieldset>


      <fieldset>
        <legend>Áreas de Interesse</legend>

        <label><input type="checkbox" name="interesses[]" value="web"> Desenvolvimento Web</label><br>
        <label><input type="checkbox" name="interesses[]" value="bd"> Banco de Dados</label><br>
        <label><input type="checkbox" name="interesses[]" value="ia"> Inteligência Artificial</label><br>
        <label><input type="checkbox" name="interesses[]" value="seg"> Segurança da Informação</label><br>
        <label><input type="checkbox" name="interesses[]" value="infra"> Infraestrutura</label>

      </fieldset>

      <br>

      <button type="submit">Solicitar matrícula</button>
      <button type="reset">Limpar formulário</button>

    </form>

  </main>

</body>
</html>
